<!doctype html>
<!--
  chipus demo — a typo-tolerant Hebrew / transliteration search over the
  54 parshiyot plus a handful of famous pesukim and phrases.

  This page imports the library as an ES module via a relative path
  (../src/index.js), so it must be served over HTTP, not opened as a
  file:// URL. From the repo root:

    python3 -m http.server
    # then open http://localhost:8000/demo/
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>chipus · חיפוש — demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: light dark;
    --bg: #fafafa; --fg: #1a1a1a; --muted: #666; --border: #ddd;
    --card: #fff; --accent: #2b6cb0; --chip: #eef2f7; --chip-fg: #2b6cb0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17181a; --fg: #eee; --muted: #999; --border: #333;
      --card: #222; --accent: #7ab8ff; --chip: #2a2f36; --chip-fg: #7ab8ff;
    }
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--fg); margin: 0; padding: 2rem 1rem 4rem;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
  h1 .heb { direction: rtl; }
  p.sub { color: var(--muted); margin-top: 0; font-size: .9rem; }
  input#q {
    width: 100%; font-size: 1.2rem; padding: .6rem .8rem; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card); color: var(--fg);
    unicode-bidi: plaintext; /* let RTL/LTR follow the typed text */
  }
  #chips { margin: .6rem 0 1.2rem; display: flex; flex-wrap: wrap; gap: .4rem; }
  .chip {
    background: var(--chip); color: var(--chip-fg); border: none; border-radius: 999px;
    padding: .3rem .7rem; font-size: .85rem; cursor: pointer; unicode-bidi: plaintext;
  }
  .chip:hover { opacity: .8; }
  #count { color: var(--muted); font-size: .85rem; margin-bottom: .5rem; min-height: 1.2em; }
  .result {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: .6rem .9rem; margin-bottom: .5rem;
  }
  .result .main { display: flex; justify-content: space-between; align-items: baseline; gap: .6rem; }
  .result .he { direction: rtl; font-size: 1.15rem; unicode-bidi: plaintext; }
  .result .en { color: var(--muted); font-size: .85rem; }
  .result .score { color: var(--accent); font-size: .8rem; font-variant-numeric: tabular-nums; }
  .result .matches { font-size: .78rem; color: var(--muted); margin-top: .25rem; unicode-bidi: plaintext; }
  .result .matches b { color: var(--fg); }
  footer { color: var(--muted); font-size: .8rem; margin-top: 2rem; }
</style>
</head>
<body>
<main>
  <h1><span class="heb">חיפוש</span> chipus demo</h1>
  <p class="sub">Typo-tolerant search over the 54 parshiyot + famous pesukim. Type Hebrew, English transliteration, or Yiddish — typos welcome.</p>

  <input id="q" type="text" placeholder="Search… בראשית, Bereishis, lech lecha…" autocomplete="off">
  <div id="chips"></div>
  <div id="count"></div>
  <div id="results"></div>

  <footer>Powered by <a href="../src/index.js">chipus</a>, zero-dependency ESM.</footer>
</main>

<script type="module">
  import { ChipusIndex } from "../src/index.js";

  // Embedded corpus: all 54 parshiyot + a handful of famous pesukim/phrases.
  const parshiyot = [
    { he: "בראשית", en: "Bereishit", book: "Bereishit" },
    { he: "נח", en: "Noach", book: "Bereishit" },
    { he: "לך לך", en: "Lech Lecha", book: "Bereishit" },
    { he: "וירא", en: "Vayera", book: "Bereishit" },
    { he: "חיי שרה", en: "Chayei Sarah", book: "Bereishit" },
    { he: "תולדות", en: "Toldot", book: "Bereishit" },
    { he: "ויצא", en: "Vayetze", book: "Bereishit" },
    { he: "וישלח", en: "Vayishlach", book: "Bereishit" },
    { he: "וישב", en: "Vayeshev", book: "Bereishit" },
    { he: "מקץ", en: "Miketz", book: "Bereishit" },
    { he: "ויגש", en: "Vayigash", book: "Bereishit" },
    { he: "ויחי", en: "Vayechi", book: "Bereishit" },
    { he: "שמות", en: "Shemot", book: "Shemot" },
    { he: "וארא", en: "Vaera", book: "Shemot" },
    { he: "בא", en: "Bo", book: "Shemot" },
    { he: "בשלח", en: "Beshalach", book: "Shemot" },
    { he: "יתרו", en: "Yitro", book: "Shemot" },
    { he: "משפטים", en: "Mishpatim", book: "Shemot" },
    { he: "תרומה", en: "Terumah", book: "Shemot" },
    { he: "תצוה", en: "Tetzaveh", book: "Shemot" },
    { he: "כי תשא", en: "Ki Tisa", book: "Shemot" },
    { he: "ויקהל", en: "Vayakhel", book: "Shemot" },
    { he: "פקודי", en: "Pekudei", book: "Shemot" },
    { he: "ויקרא", en: "Vayikra", book: "Vayikra" },
    { he: "צו", en: "Tzav", book: "Vayikra" },
    { he: "שמיני", en: "Shemini", book: "Vayikra" },
    { he: "תזריע", en: "Tazria", book: "Vayikra" },
    { he: "מצרע", en: "Metzora", book: "Vayikra" },
    { he: "אחרי מות", en: "Achrei Mot", book: "Vayikra" },
    { he: "קדושים", en: "Kedoshim", book: "Vayikra" },
    { he: "אמור", en: "Emor", book: "Vayikra" },
    { he: "בהר", en: "Behar", book: "Vayikra" },
    { he: "בחוקותי", en: "Bechukotai", book: "Vayikra" },
    { he: "במדבר", en: "Bamidbar", book: "Bamidbar" },
    { he: "נשא", en: "Naso", book: "Bamidbar" },
    { he: "בהעלותך", en: "Beha'alotcha", book: "Bamidbar" },
    { he: "שלח", en: "Shelach", book: "Bamidbar" },
    { he: "קרח", en: "Korach", book: "Bamidbar" },
    { he: "חקת", en: "Chukat", book: "Bamidbar" },
    { he: "בלק", en: "Balak", book: "Bamidbar" },
    { he: "פינחס", en: "Pinchas", book: "Bamidbar" },
    { he: "מטות", en: "Matot", book: "Bamidbar" },
    { he: "מסעי", en: "Masei", book: "Bamidbar" },
    { he: "דברים", en: "Devarim", book: "Devarim" },
    { he: "ואתחנן", en: "Vaetchanan", book: "Devarim" },
    { he: "עקב", en: "Eikev", book: "Devarim" },
    { he: "ראה", en: "Re'eh", book: "Devarim" },
    { he: "שופטים", en: "Shoftim", book: "Devarim" },
    { he: "כי תצא", en: "Ki Teitzei", book: "Devarim" },
    { he: "כי תבוא", en: "Ki Tavo", book: "Devarim" },
    { he: "נצבים", en: "Nitzavim", book: "Devarim" },
    { he: "וילך", en: "Vayelech", book: "Devarim" },
    { he: "האזינו", en: "Haazinu", book: "Devarim" },
    { he: "וזאת הברכה", en: "V'Zot HaBerachah", book: "Devarim" },
  ];

  const pesukim = [
    { he: "שמע ישראל ה׳ אלהינו ה׳ אחד", en: "Shema Yisrael", source: "Devarim 6:4" },
    { he: "בראשית ברא אלהים את השמים ואת הארץ", en: "In the beginning", source: "Bereishit 1:1" },
    { he: "ואהבת לרעך כמוך", en: "Love your neighbor as yourself", source: "Vayikra 19:18" },
    { he: "אנכי ה׳ אלהיך", en: "I am the Lord your God", source: "Shemot 20:2" },
    { he: "צדק צדק תרדף", en: "Justice, justice shall you pursue", source: "Devarim 16:20" },
    { he: "הנה מה טוב ומה נעים שבת אחים גם יחד", en: "Behold how good and pleasant", source: "Tehillim 133:1" },
    { he: "תורה צוה לנו משה מורשה קהלת יעקב", en: "Moshe commanded us the Torah", source: "Devarim 33:4" },
    { he: "אם אין אני לי מי לי", en: "If I am not for myself, who is for me", source: "Pirkei Avot 1:14" },
    { he: "כל ישראל ערבים זה בזה", en: "All of Israel are guarantors for one another", source: "Shevuot 39a" },
    { he: "נעשה ונשמע", en: "We will do and we will hear", source: "Shemot 24:7" },
    { he: "זיי א מענטש", en: "Be a mentsh", source: "Yiddish saying" },
  ];

  const idx = new ChipusIndex({
    fields: [
      { name: "he", weight: 3 },
      { name: "en", weight: 3 },
      { name: "book", weight: 1 },
      { name: "source", weight: 1 },
    ],
  });

  const docs = [
    ...parshiyot.map((p) => ({ kind: "Parsha", ...p })),
    ...pesukim.map((p) => ({ kind: "Pasuk", ...p })),
  ];
  idx.add(docs);

  const qEl = document.getElementById("q");
  const countEl = document.getElementById("count");
  const resultsEl = document.getElementById("results");
  const chipsEl = document.getElementById("chips");

  const EXAMPLES = ["בראשית", "Bereishis", "lech lecha", "shabbos", "mentsh", "berelshit"];
  for (const ex of EXAMPLES) {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = ex;
    b.onclick = () => { qEl.value = ex; render(); qEl.focus(); };
    chipsEl.appendChild(b);
  }

  function render() {
    const query = qEl.value.trim();
    resultsEl.innerHTML = "";
    if (!query) { countEl.textContent = ""; return; }

    const results = idx.search(query, { limit: 15 });
    countEl.textContent = `${results.length} result${results.length === 1 ? "" : "s"} for "${query}"`;

    for (const r of results) {
      const label = r.doc.en || r.doc.source;
      const sub = r.doc.book || r.doc.source || "";
      const matchStr = r.matches
        .map((m) => `<b>${m.token}</b>→${m.key} in ${m.field}`)
        .join(", ");

      const div = document.createElement("div");
      div.className = "result";
      div.innerHTML = `
        <div class="main">
          <span class="he">${r.doc.he}</span>
          <span class="score">${r.score.toFixed(0)}</span>
        </div>
        <div class="en">${r.doc.kind} · ${label} ${sub ? "· " + sub : ""}</div>
        <div class="matches">${matchStr}</div>
      `;
      resultsEl.appendChild(div);
    }
  }

  qEl.addEventListener("input", render);
</script>
</body>
</html>
